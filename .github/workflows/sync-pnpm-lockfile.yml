name: Sync pnpm lockfile

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - principal
    paths:
      - package.json
      - pnpm-workspace.yaml
      - pnpm-lock.yaml
      - .github/workflows/sync-pnpm-lockfile.yml
      - artifacts/iattom-assist/.railway-trigger

permissions:
  contents: write

jobs:
  sync-lockfile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Enable pnpm 9.15.9
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate
          pnpm --version

      - name: Regenerate pnpm lockfile
        run: pnpm install --lockfile-only --no-frozen-lockfile

      - name: Validate frozen install
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Commit updated lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet pnpm-lock.yaml; then
            echo "pnpm-lock.yaml already synchronized"
          else
            git add pnpm-lock.yaml
            git commit -m "Sync pnpm lockfile with pnpm 9.15.9"
            git push
          fi
