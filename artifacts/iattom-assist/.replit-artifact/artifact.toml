kind = "web"
previewPath = "/"
title = "IAttom Assist"
version = "1.0.0"
id = "artifacts/iattom-assist"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25638

[services.development]
run = "pnpm --filter @workspace/iattom-assist run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/iattom-assist", "run", "build" ]
publicDir = "artifacts/iattom-assist/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25638"
BASE_PATH = "/"
